services:
  audio-worker:
    image: ghcr.io/hor1zon777/m3u8preview-audio-worker-web:latest
    ports:
      - "3900:3900"
    volumes:
      - ./data/config:/etc/audio-worker          # 配置持久化
      - ./data/audio:/data/audio-artifacts       # FLAC 存储
      - ./data/temp:/data/temp                   # 临时文件
    environment:
      - RUST_LOG=info
    restart: unless-stopped
